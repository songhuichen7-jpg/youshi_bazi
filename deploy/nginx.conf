# ─────────────────────────────────────────────────────────────────────
# 有时 / youshi.app 生产 nginx 反代配置示例
#
# 拓扑:
#   nginx (443 + 80)
#     ├── /          → frontend SPA 静态文件 (vite build → dist/)
#     ├── /api/      → uvicorn :3101  (普通 API + SSE 流)
#     └── /static/   → uvicorn :3101  (后端服务的 share-card / media-cache 等)
#
# 关键点:
#   - SSE (text/event-stream) 路由必须把 read_timeout 拉长。后端一条完
#     整 chat 回答可能 30-90s,默认 60s 会中途断流。这里设 300s,够 LLM
#     长答 + 古籍润色慢速场景。
#   - proxy_buffering off — SSE 必须立即把每个 chunk 推给客户端,nginx
#     默认会 buffer 整段,造成"思考很久才一次性出现"的体感。
#   - X-Accel-Buffering: no 是后端兜底 header (server 端 _SSE_HEADERS
#     已经塞了),双保险确保 nginx 任何模块都不缓冲。
#   - WebSocket / Upgrade 头 — 当前没用 ws 但留着,未来 hot-reload 不
#     折腾 (Vite dev 用,生产 SPA 静态文件不用)。
# ─────────────────────────────────────────────────────────────────────

upstream youshi_api {
  server 127.0.0.1:3101 fail_timeout=10s;
  # 多 worker 时把上面那行复制成多条,nginx 自己会 round-robin。但更
  # 推荐 uvicorn 自己起 N workers (--workers N),让 OS 调度,nginx 这
  # 边只指一个 upstream port。
  keepalive 32;
}

# HTTP → HTTPS 自动跳转(certbot 申请证书后用)
server {
  listen 80;
  server_name youshi.app www.youshi.app;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name youshi.app www.youshi.app;

  # certbot 写入路径:certbot --nginx 时自动填这两行
  ssl_certificate     /etc/letsencrypt/live/youshi.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/youshi.app/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;

  # 安全 header — HSTS / no-sniff / frame-ancestors,不影响业务
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # 上传 / 大请求体限制 — 默认 1MB 太小 (邀请生成的 birth payload 很小,
  # 但留点余量给将来的图片上传等)
  client_max_body_size 5m;

  # ── 前端 SPA ────────────────────────────────────────────────────────
  root /var/www/youshi/frontend/dist;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
    # 静态资源缓存:hashed 文件名长 cache,index.html 短 cache
    add_header Cache-Control "no-cache" always;
  }

  location ~* \.(js|css|woff2?|png|jpe?g|gif|svg|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # ── 后端 API (普通,非流式) ─────────────────────────────────────────
  # 短请求,默认超时够用。
  location /api/ {
    proxy_pass http://youshi_api;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    60s;
  }

  # ── SSE 流式路由 (chat / gua / classics / hepan-chat) ──────────────
  # 这几条路径会持续 push event-stream,需要长 timeout + 关闭 buffering。
  # 用 location ~* ... 单独覆盖,优先级高于上面的通用 /api/。
  location ~* ^/api/(conversations/[^/]+/(messages|gua)|charts/[^/]+/(classics|chat-stream)|hepan/[^/]+/(messages|chat|reading))$ {
    proxy_pass http://youshi_api;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # SSE 关键三件套
    proxy_buffering    off;
    proxy_cache        off;
    chunked_transfer_encoding on;

    proxy_connect_timeout 10s;
    proxy_send_timeout    300s;   # 慢回答 + 古籍润色场景留够
    proxy_read_timeout    300s;
  }

  # ── 后端静态(media-cache / share-card 等)─────────────────────────
  location /static/ {
    proxy_pass http://youshi_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;

    # 后端服务的图都是 hashed 文件名,放心长 cache
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  # 健康检查 — 保留无超时,LB 探活用
  location = /api/health {
    proxy_pass http://youshi_api;
    proxy_set_header Host $host;
    access_log off;
  }
}
