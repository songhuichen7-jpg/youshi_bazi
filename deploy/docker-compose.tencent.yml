services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./postgres.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${YOUSHI_IMAGE:?set YOUSHI_IMAGE in .env}
    restart: unless-stopped
    env_file:
      - ./app.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./var/media-cache:/app/server/var/media-cache
      - ./var/avatars:/app/server/var/avatars
      - ./var/static/cards/illustrations:/app/server/app/data/cards/illustrations:ro
      - ./var/static/hepan/illustrations:/app/server/app/data/hepan/illustrations:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:3101/api/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 8s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro

volumes:
  postgres-data:
  redis-data:
