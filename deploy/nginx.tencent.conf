proxy_cache_path /var/cache/nginx/youshi_static levels=1:2 keys_zone=youshi_static:20m max_size=512m inactive=7d use_temp_path=off;

gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_vary on;
gzip_proxied any;
gzip_types
  text/plain
  text/css
  text/xml
  application/json
  application/javascript
  application/xml
  image/svg+xml
  font/ttf
  font/otf
  font/woff
  font/woff2;

upstream youshi_api {
  server app:3101;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 8m;

  location = /api/health {
    proxy_pass http://youshi_api;
    proxy_set_header Host $host;
    access_log off;
  }

  location ~* ^/api/(conversations/[^/]+/(messages|gua)|charts/[^/]+/(classics|chat-stream)|hepan/[^/]+/(messages|chat|reading))$ {
    proxy_pass http://youshi_api;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  location /api/ {
    proxy_pass http://youshi_api;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 90s;
  }

  location = /api/media/cover {
    proxy_pass http://youshi_api;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 90s;
    proxy_cache youshi_static;
    proxy_cache_key "$scheme$host$request_uri";
    proxy_cache_lock on;
    proxy_cache_valid 200 1h;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    add_header Cache-Control "public, max-age=3600" always;
    add_header X-Cache-Status $upstream_cache_status always;
  }

  location ^~ /static/cards/ {
    if ($http_accept ~* "image/webp") {
      rewrite ^/static/cards/illustrations/(.+)\.png$ /static/cards/illustrations/$1.webp break;
    }
    proxy_pass http://youshi_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout 90s;
    proxy_cache youshi_static;
    proxy_cache_key "$scheme$host$uri$is_args$args";
    proxy_cache_lock on;
    proxy_cache_valid 200 7d;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
    add_header Vary Accept always;
    add_header X-Cache-Status $upstream_cache_status always;
  }

  location ^~ /static/hepan/ {
    if ($http_accept ~* "image/webp") {
      rewrite ^/static/hepan/illustrations/(.+)\.png$ /static/hepan/illustrations/$1.webp break;
    }
    proxy_pass http://youshi_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout 90s;
    proxy_cache youshi_static;
    proxy_cache_key "$scheme$host$uri$is_args$args";
    proxy_cache_lock on;
    proxy_cache_valid 200 7d;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
    add_header Vary Accept always;
    add_header X-Cache-Status $upstream_cache_status always;
  }

  location ^~ /static/media-cache/ {
    proxy_pass http://youshi_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout 90s;
    proxy_cache youshi_static;
    proxy_cache_lock on;
    proxy_cache_valid 200 7d;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
    add_header X-Cache-Status $upstream_cache_status always;
  }

  location ^~ /static/avatars/ {
    proxy_pass http://youshi_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout 90s;
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache" always;
  }

  location ~* \.(js|css|woff2?|png|jpe?g|gif|svg|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
}
