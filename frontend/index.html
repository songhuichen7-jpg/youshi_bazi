    <!-- Specimen edition typeface stack:
         - LXGW WenKai (霞鹜文楷) for Chinese display headings on cards
         - Spectral for Latin scholarly serif (italic binomials)
         - Fragment Mono for archival small-caps labels
         Loaded with display=swap so PingFang/system fallback renders instantly,
         then the webfont swaps in once available — no FOIT. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Fragment+Mono&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css"
    />
  </head>
